{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>Customers</h1>
  <a class="btn btn-primary" href="{% url 'customer_add' %}">Add Customer</a>
</div>

<div class="card">
  <div class="card-body">
    {% if customers %}
    <table class="table table-hover">
      <thead>
        <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Actions</th></tr>
      </thead>
      <tbody>
        {% for c in customers %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ c.name }}</td>
          <td>{{ c.email }}</td>
          <td>{{ c.phone }}</td>
          <td>
            <a class="btn btn-sm btn-outline-secondary" href="{% url 'customer_update' c.pk %}">Edit</a>
            <a class="btn btn-sm btn-danger" href="{% url 'customer_delete' c.pk %}">Delete</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
      <p class="text-muted">No customers yet.</p>
    {% endif %}
  </div>
</div>
{% endblock %}
