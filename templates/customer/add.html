{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header"><h4>Add Customer</h4></div>
      <div class="card-body">
        <form method="post">{% csrf_token %}
          {{ form.as_p }}
          <button class="btn btn-primary">Create</button>
          <a class="btn btn-secondary" href="{% url 'customer_list' %}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
