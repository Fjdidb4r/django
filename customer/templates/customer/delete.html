{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white"><h5>Confirm Delete</h5></div>
      <div class="card-body">
        <p>Delete <strong>{{ object.name }}</strong>?</p>
        <form method="post">{% csrf_token %}
          <button class="btn btn-danger">Yes, delete</button>
          <a class="btn btn-secondary" href="{% url 'customer_list' %}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
